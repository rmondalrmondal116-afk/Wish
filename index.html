<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PALLABI's Mega Celebration</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #e0f7fa; overflow: hidden; font-family: 'Arial', sans-serif; }

        /* Scenery */
        .scenery { position: absolute; width: 100%; height: 100vh; background: linear-gradient(#81d4fa, #e1f5fe); z-index: 1; }
        .grass { position: absolute; bottom: 0; width: 100%; height: 28vh; background: #8bc34a; border-top: 5px solid #689f38; }
        .tree { position: absolute; bottom: 22vh; width: 100px; z-index: 2; }
        
        #instruction { position: absolute; top: 20px; width: 100%; text-align: center; font-weight: bold; font-size: 20px; color: #2c3e50; z-index: 100; text-shadow: 2px 2px 4px white; }

        /* The Party Crowd */
        .characters { position: absolute; bottom: 8vh; width: 100%; display: flex; justify-content: space-around; align-items: flex-end; z-index: 10; padding: 0 10px; }
        .char { width: 90px; text-align: center; position: relative; transition: all 0.5s; opacity: 1; }
        .char img { width: 100%; filter: drop-shadow(5px 5px 5px rgba(0,0,0,0.2)); }
        
        /* Message Bubbles */
        .bubble { 
            background: white; border-radius: 15px; padding: 10px; font-size: 13px; 
            position: absolute; bottom: 110%; left: 50%; transform: translateX(-50%); 
            display: none; border: 2px solid #f06292; width: 150px; color: #333; font-weight: bold;
            box-shadow: 0 5px 10px rgba(0,0,0,0.1); z-index: 20;
        }
        .bubble::after { content: ''; position: absolute; bottom: -10px; left: 50%; transform: translateX(-50%); border-left: 8px solid transparent; border-right: 8px solid transparent; border-top: 10px solid white; }

        /* Cake & Candles */
        .cake-zone { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); z-index: 30; text-align: center; }
        .cake-img { width: 220px; cursor: pointer; filter: drop-shadow(0 10px 15px rgba(0,0,0,0.3)); }
        .candle { position: absolute; width: 8px; height: 35px; background: #fff; border-radius: 4px; z-index: 31; border: 1px solid #ddd; }
        .flame { position: absolute; top: -15px; left: 50%; transform: translateX(-50%); width: 12px; height: 18px; background: orange; border-radius: 50%; animation: flicker 0.1s infinite; box-shadow: 0 0 10px orange; }
        @keyframes flicker { 0%, 100% { transform: translateX(-50%) scale(1); } 50% { transform: translateX(-50%) scale(1.2); } }
        
        #knife { width: 70px; position: absolute; top: 45%; left: 65%; display: none; cursor: pointer; z-index: 100; animation: bounce 1s infinite; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

        /* Butterfly Message (Carried) */
        #message-container { position: absolute; top: -400px; left: 50%; transform: translateX(-50%); z-index: 50; display: flex; flex-direction: column; align-items: center; }
        .butterfly-group { display: flex; justify-content: space-between; width: 180px; }
        .b-fly { width: 60px; animation: flap 0.2s infinite; }
        @keyframes flap { 0%, 100% { transform: scaleY(1); } 50% { transform: scaleY(0.4); } }
        .wish-box { background: white; padding: 25px; border-radius: 20px; border: 4px solid #f06292; box-shadow: 0 15px 30px rgba(0,0,0,0.2); width: 300px; text-align: center; margin-top: -15px; }

        .confetti { position: absolute; width: 12px; height: 12px; z-index: 40; display: none; border-radius: 2px; }
    </style>
</head>
<body>

    <div id="instruction">Wait for the magic... and then blow! 💨</div>

    <div class="scenery">
        <div class="grass"></div>
        <img src="https://img.icons8.com/color/120/000000/tree.png" class="tree" style="left: 8%;">
        <img src="https://img.icons8.com/color/120/000000/tree.png" class="tree" style="right: 8%;">
    </div>

    <div id="message-container">
        <div class="butterfly-group">
            <img src="https://img.icons8.com/clouds/100/000000/butterfly.png" class="b-fly">
            <img src="https://img.icons8.com/clouds/100/000000/butterfly.png" class="b-fly">
        </div>
        <div class="wish-box">
            <h2 style="color:#ad1457; font-size: 20px;">Happy Birthday PALLABI</h2>
            <p style="font-size: 15px; margin-top: 10px; line-height: 1.4; color: #444;">"Today holds no magic of its own; it is your presence that lends this day its light."</p>
        </div>
    </div>
